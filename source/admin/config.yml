locale: zh_Hans
site_url: https://gudong226.linuxdo.space
display_url: https://gudong226.linuxdo.space
logo_url: /img/favicon.svg

backend:
  name: github
  repo: GuDong2003/boke
  branch: main
  base_url: https://gudong226.linuxdo.space
  auth_endpoint: /api/auth
  site_domain: gudong226.linuxdo.space

publish_mode: simple
media_folder: source/img/uploads
public_folder: /img/uploads

editor:
  preview: false

slug:
  encoding: unicode

collections:
  - name: posts
    label: 文章
    label_singular: 文章
    folder: source/_posts
    create: true
    delete: true
    extension: md
    format: frontmatter
    sortable_fields:
      - date
      - updated
      - title
    summary: '{{title}}'
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    fields:
      - label: 标题
        name: title
        widget: string
      - label: 发布时间
        name: date
        widget: datetime
        format: YYYY-MM-DD HH:mm:ss
        date_format: YYYY-MM-DD
        time_format: HH:mm:ss
      - label: 更新时间
        name: updated
        widget: datetime
        required: false
        format: YYYY-MM-DD HH:mm:ss
        date_format: YYYY-MM-DD
        time_format: HH:mm:ss
      - label: 摘要
        name: description
        widget: text
        required: false
      - label: 分类
        name: categories
        widget: list
        required: false
        field:
          label: 分类
          name: category
          widget: string
      - label: 标签
        name: tags
        widget: list
        required: false
        field:
          label: 标签
          name: tag
          widget: string
      - label: 封面
        name: cover
        widget: image
        required: false
        choose_url: false
        media_folder: /source/img/uploads
        public_folder: /img/uploads
      - label: 顶图
        name: top_img
        widget: image
        required: false
        choose_url: false
        media_folder: /source/img/uploads
        public_folder: /img/uploads
      - label: 正文
        name: body
        widget: markdown

  - name: pages
    label: 页面
    delete: false
    editor:
      preview: false
    files:
      - label: 关于页
        name: about
        file: source/about/index.md
        fields:
          - label: 标题
            name: title
            widget: string
          - label: 日期
            name: date
            widget: datetime
            format: YYYY-MM-DD HH:mm:ss
            date_format: YYYY-MM-DD
            time_format: HH:mm:ss
          - label: 顶图
            name: top_img
            widget: image
            required: false
            choose_url: false
            media_folder: /source/img/uploads
            public_folder: /img/uploads
          - label: 正文
            name: body
            widget: markdown

  - name: site_settings
    label: 站点设置
    delete: false
    editor:
      preview: false
    files:
      - label: 首页标语
        name: homepage_copy
        file: source/site-copy.json
        format: json
        fields:
          - label: 首页动态标语
            name: homepage_subtitles
            widget: list
            summary: '{{fields.subtitle}}'
            min: 1
            field:
              label: 标语
              name: subtitle
              widget: string
      - label: 站点资料
        name: site_profile
        file: source/site-profile.json
        format: json
        fields:
          - label: 头像
            name: avatar
            widget: image
            required: false
            choose_url: false
            media_folder: /source/img/uploads
            public_folder: /img/uploads
          - label: 网站图标
            name: favicon
            widget: image
            required: false
            choose_url: false
            media_folder: /source/img/uploads
            public_folder: /img/uploads
          - label: 作者名
            name: author_name
            widget: string
            required: false
          - label: 作者简介
            name: author_description
            widget: text
            required: false
          - label: 公告
            name: announcement
            widget: text
            required: false
          - label: 页脚文案
            name: footer_text
            widget: text
            required: false

      - label: 背景图片
        name: site_backgrounds
        file: source/site-backgrounds.json
        format: json
        fields:
          - label: 全站背景
            name: site_bg
            widget: image
            required: false
            choose_url: false
            media_folder: /source/img/uploads
            public_folder: /img/uploads
            hint: 页面主体背景图，覆盖在整个网站内容区域后面
          - label: 首页顶图
            name: home_top_img
            widget: image
            required: false
            choose_url: false
            media_folder: /source/img/uploads
            public_folder: /img/uploads
            hint: 首页大图横幅背景
          - label: 默认顶图
            name: default_top_img
            widget: image
            required: false
            choose_url: false
            media_folder: /source/img/uploads
            public_folder: /img/uploads
            hint: 文章和页面没有单独设置顶图时使用的默认背景
          - label: 归档页顶图
            name: archive_img
            widget: image
            required: false
            choose_url: false
            media_folder: /source/img/uploads
            public_folder: /img/uploads
          - label: 标签页顶图
            name: tag_img
            widget: image
            required: false
            choose_url: false
            media_folder: /source/img/uploads
            public_folder: /img/uploads
          - label: 分类页顶图
            name: category_img
            widget: image
            required: false
            choose_url: false
            media_folder: /source/img/uploads
            public_folder: /img/uploads
          - label: 404 页面背景
            name: error_bg
            widget: image
            required: false
            choose_url: false
            media_folder: /source/img/uploads
            public_folder: /img/uploads
          - label: 默认文章封面
            name: default_covers
            widget: list
            required: false
            summary: '{{fields.cover}}'
            hint: 文章没有设置封面时，从这个列表中随机选取
            field:
              label: 封面图
              name: cover
              widget: image
              choose_url: false
              media_folder: /source/img/uploads
              public_folder: /img/uploads

      - label: 音乐播放器
        name: site_music
        file: source/site-music.json
        format: json
        fields:
          - label: 启用播放器
            name: enabled
            widget: boolean
            default: true
            required: false
          - label: 显示名称
            name: label
            widget: string
            required: false
            hint: 显示在悬浮播放器上的小标题，比如“音乐角落”
          - label: 播放来源
            name: sourceMode
            widget: select
            default: remote
            required: false
            options:
              - label: 网易云音乐
                value: remote
              - label: 上传歌曲
                value: upload
            hint: 选择“上传歌曲”后，可以直接在下方上传 mp3、m4a、flac 等音频文件
          - label: 音乐来源
            name: server
            widget: select
            default: netease
            required: false
            options:
              - label: 网易云音乐
                value: netease
            hint: 仅在“网易云音乐”模式下生效
          - label: 播放类型
            name: type
            widget: select
            default: song
            required: false
            options:
              - label: 单曲
                value: song
              - label: 歌单
                value: playlist
            hint: 仅在“网易云音乐”模式下生效
          - label: 音乐 ID
            name: id
            widget: string
            required: false
            hint: 仅在“网易云音乐”模式下填写。单曲填歌曲 ID，歌单填歌单 ID，例如 1966353373
          - label: 上传歌曲列表
            name: tracks
            widget: list
            required: false
            collapsed: true
            hint: 仅在“上传歌曲”模式下使用。可以添加多首歌，播放器会按列表顺序或随机模式播放
            summary: '{{fields.name}}'
            fields:
              - label: 歌曲名
                name: name
                widget: string
                required: false
                hint: 不填时会自动使用文件名作为歌曲标题
              - label: 歌手
                name: artist
                widget: string
                required: false
              - label: 音频文件
                name: url
                widget: file
                choose_url: false
                media_folder: /source/audio/uploads
                public_folder: /audio/uploads
                hint: 上传本地歌曲文件，保存后会一起提交到仓库
              - label: 封面
                name: cover
                widget: image
                required: false
                choose_url: false
                media_folder: /source/img/uploads
                public_folder: /img/uploads
          - label: 音量
            name: volume
            widget: number
            value_type: float
            min: 0
            max: 1
            step: 0.05
            default: 0.45
            hint: 0 到 1 之间，推荐 0.3 到 0.6
          - label: 自动播放
            name: autoplay
            widget: boolean
            default: false
            required: false
            hint: 浏览器可能仍会因为自动播放策略拦截播放
          - label: 循环方式
            name: loop
            widget: select
            default: all
            options:
              - label: 全部循环
                value: all
              - label: 单曲循环
                value: one
              - label: 不循环
                value: none
          - label: 播放顺序
            name: order
            widget: select
            default: list
            options:
              - label: 顺序播放
                value: list
              - label: 随机播放
                value: random
          - label: 与页面内播放器互斥
            name: mutex
            widget: boolean
            default: true
            required: false
            hint: 开启后，文章内播放器开始播放时会暂停全站播放器
