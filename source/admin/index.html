<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>咕咚的小站 · 内容管理</title>
    <link rel="icon" href="/img/favicon.svg" />
    <link rel="stylesheet" href="/admin/admin.css" />
  </head>
  <body data-admin-view="dashboard" data-admin-ready="false">
    <div class="admin-shell">
      <header class="admin-nav">
        <a class="admin-brand" href="/" target="_blank" rel="noopener">
          <span class="admin-brand-icon">
            <img src="/img/favicon.svg" alt="" />
          </span>
          <span class="admin-brand-copy">
            <span class="admin-brand-kicker">咕咚的小站</span>
            <span class="admin-brand-title">内容管理</span>
          </span>
        </a>
        <nav class="admin-nav-links" aria-label="快捷入口">
          <a class="admin-nav-link" href="/" target="_blank" rel="noopener">主站</a>
          <a class="admin-nav-link" href="/archives/" target="_blank" rel="noopener">归档</a>
          <a class="admin-nav-link admin-nav-link-primary" href="https://github.com/GuDong2003/boke" target="_blank" rel="noopener">仓库</a>
          <button class="admin-theme-toggle" id="admin-theme-toggle" type="button" title="切换明暗模式" aria-label="切换明暗模式"></button>
        </nav>
      </header>
      <main class="admin-stage">
        <div class="admin-stage-frame">
          <div class="admin-stage-head">
            <div class="admin-stage-copy">
              <span class="admin-stage-label">编辑器画布</span>
              <p class="admin-stage-text">功能由 Decap CMS 提供，外层界面按主站视觉重写。</p>
            </div>
            <div class="admin-stage-actions">
              <a class="admin-stage-link" href="/admin/cms.html" target="_blank" rel="noopener">单独打开编辑器</a>
            </div>
          </div>
          <div class="admin-frame-shell">
            <div class="admin-frame-loading" id="admin-frame-loading">正在载入内容后台...</div>
            <iframe
              id="admin-cms-frame"
              class="admin-cms-frame"
              title="咕咚的小站内容管理编辑器"
              loading="eager"
            ></iframe>
          </div>
        </div>
      </main>
    </div>
    <script defer src="/admin/admin.js"></script>
  </body>
</html>
