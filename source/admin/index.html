<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>咕咚的小站 · 内容管理</title>
    <link rel="icon" href="/img/favicon.svg" />
    <link rel="stylesheet" href="/admin/admin.css" />
    <script>
      (function(){var t;try{t=localStorage.getItem('admin-theme')}catch(e){}if(!t)t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)})();
    </script>
  </head>
  <body data-admin-view="dashboard" data-admin-ready="false">
    <div class="admin-shell">
      <header class="admin-nav">
        <a class="admin-brand" href="/" target="_blank" rel="noopener">
          <span class="admin-brand-icon">
            <img src="/img/favicon.svg" alt="" />
          </span>
          <span class="admin-brand-copy">
            <span class="admin-brand-kicker">咕咚的小站</span>
            <span class="admin-brand-title">内容管理</span>
          </span>
        </a>
        <nav class="admin-nav-links" aria-label="快捷入口">
          <a class="admin-nav-link" href="/" target="_blank" rel="noopener">主站</a>
          <a class="admin-nav-link" href="/archives/" target="_blank" rel="noopener">归档</a>
          <a class="admin-nav-link admin-nav-link-primary" href="https://github.com/GuDong2003/boke" target="_blank" rel="noopener">仓库</a>
          <button class="admin-theme-toggle" id="admin-theme-toggle" type="button" title="切换明暗模式" aria-label="切换明暗模式">
            <svg class="admin-icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="admin-icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
        </nav>
      </header>
      <main class="admin-stage">
        <div class="admin-stage-frame">
          <div class="admin-stage-head">
            <div class="admin-stage-copy">
              <span class="admin-stage-label">编辑器画布</span>
              <p class="admin-stage-text">功能由 Decap CMS 提供，外层界面按主站视觉重写。</p>
            </div>
            <div class="admin-stage-actions">
              <a class="admin-stage-link" href="/admin/cms.html" target="_blank" rel="noopener">单独打开编辑器</a>
            </div>
          </div>
          <div class="admin-frame-shell">
            <div class="admin-frame-loading" id="admin-frame-loading">正在载入内容后台...</div>
            <iframe
              id="admin-cms-frame"
              class="admin-cms-frame"
              title="咕咚的小站内容管理编辑器"
              loading="eager"
            ></iframe>
          </div>
        </div>
      </main>
    </div>
    <script defer src="/admin/admin.js"></script>
  </body>
</html>
